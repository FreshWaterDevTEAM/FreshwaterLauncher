name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/publish (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-sync-server:
    name: fwl-sync-server (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fwl-sync-server-windows-x64.exe
            bin: fwl-sync-server.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fwl-sync-server-linux-x64
            bin: fwl-sync-server
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fwl-sync-server-macos-arm64
            bin: fwl-sync-server
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build -p fwl-sync-server --release --target ${{ matrix.target }}
      - name: Stage
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then chmod +x "dist/${{ matrix.artifact }}"; fi
      - uses: actions/upload-artifact@v4
        with:
          name: sync-${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-launcher:
    name: launcher (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
          - platform: linux-x64
            os: ubuntu-22.04
          - platform: macos-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Linux WebKit deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build Tauri
        run: npm run tauri build
      - name: Collect bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-launcher
          # Cargo workspace → binaries/bundles live under repo-root target/, not only src-tauri/target/
          SEARCH_ROOTS=(target src-tauri/target)
          copy_globs() {
            local pattern="$1"
            local dest_name="${2:-}"
            for root in "${SEARCH_ROOTS[@]}"; do
              # shellcheck disable=SC2086
              for f in ${root}/${pattern}; do
                [[ -e "$f" ]] || continue
                if [[ -n "$dest_name" ]]; then
                  cp -a "$f" "dist-launcher/${dest_name}"
                else
                  cp -a "$f" dist-launcher/
                fi
              done
            done
          }
          copy_globs "release/bundle/nsis/*.exe"
          copy_globs "release/bundle/msi/*.msi"
          copy_globs "release/bundle/appimage/*.AppImage"
          copy_globs "release/bundle/deb/*.deb"
          copy_globs "release/bundle/dmg/*.dmg"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            copy_globs "release/freshwater-launcher.exe" "FreshwaterLauncher-windows-x64.exe"
            copy_globs "release/FreshwaterLauncher.exe" "FreshwaterLauncher-windows-x64.exe"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # Zip .app bundles — GitHub Release cannot upload directories
            for root in "${SEARCH_ROOTS[@]}"; do
              for app in "${root}/release/bundle/macos/"*.app; do
                [[ -d "$app" ]] || continue
                base="$(basename "$app" .app)"
                ditto -c -k --sequesterRsrc --keepParent "$app" "dist-launcher/${base}-macos-arm64.app.zip"
              done
            done
          else
            copy_globs "release/freshwater-launcher" "FreshwaterLauncher-linux-x64"
          fi
          echo "=== dist-launcher ==="
          ls -laR dist-launcher
          # Fail the job if nothing portable was staged (was silently empty before)
          if [[ -z "$(find dist-launcher -type f | head -n1)" ]]; then
            echo "ERROR: no desktop launcher artifacts found under target/ or src-tauri/target/"
            for root in "${SEARCH_ROOTS[@]}"; do
              echo "--- find $root/release (depth 3) ---"
              find "$root/release" -maxdepth 3 -type f 2>/dev/null | head -n 80 || true
            done
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.platform }}
          path: dist-launcher/**
          if-no-files-found: error

  build-android:
    name: launcher (android-arm64)
    runs-on: ubuntu-22.04
    # Desktop release must not be blocked while Amethyst/NDK is still being hardened
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Init Amethyst nested submodules
        run: |
          git -C third_party/amethyst-android submodule update --init --recursive
          # Fallback shallow clones if gitlink checkout fails on CI
          if [[ ! -f third_party/amethyst-android/app_pojavlauncher/src/main/jni/SDL/CMakeLists.txt ]]; then
            git clone --depth 1 https://github.com/libsdl-org/SDL.git third_party/amethyst-android/app_pojavlauncher/src/main/jni/SDL
          fi
          if [[ ! -d third_party/amethyst-android/app_pojavlauncher/src/main/jni/sdl2-compat ]]; then
            git clone --depth 1 https://github.com/libsdl-org/sdl2-compat.git third_party/amethyst-android/app_pojavlauncher/src/main/jni/sdl2-compat
          fi
          if [[ ! -d third_party/amethyst-android/MobileGlues ]]; then
            git clone --depth 1 https://github.com/MobileGL-Dev/MobileGlues.git third_party/amethyst-android/MobileGlues
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK / platform tools
        run: |
          sdkmanager --install "ndk;27.3.13750724" "ndk;27.0.12077973" "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - run: npm ci
      - name: Init Android project (embed Amethyst)
        run: |
          npx tauri android init
          chmod +x scripts/patch-android-project.sh
          ./scripts/patch-android-project.sh
      - name: Build Android APK (release)
        run: |
          npx tauri android build --apk --target aarch64
      - name: Collect APK
        shell: bash
        run: |
          mkdir -p dist-android
          find src-tauri/gen/android -name "*.apk" -type f -print
          find src-tauri/gen/android -name "*.apk" -type f -exec cp {} dist-android/ \;
          shopt -s nullglob
          for f in dist-android/*.apk; do
            base=$(basename "$f")
            if [[ "$base" != FreshwaterLauncher-* ]]; then
              cp "$f" "dist-android/FreshwaterLauncher-android-arm64.apk" || true
            fi
          done
          ls -la dist-android
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-android-arm64
          path: dist-android/*
          if-no-files-found: warn

  publish:
    name: GitHub Release
    needs: [build-sync-server, build-launcher, build-android]
    if: always() && (needs.build-sync-server.result == 'success' || needs.build-launcher.result == 'success' || needs.build-android.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          continue-on-error: true
      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          # Only files — never upload .app directories (GitHub asset API rejects them)
          find artifacts -type f -exec cp {} upload/ \; || true
          # If any .app slipped through as a directory, zip it
          while IFS= read -r -d '' app; do
            base="$(basename "$app")"
            (cd "$(dirname "$app")" && zip -qr "$GITHUB_WORKSPACE/upload/${base}.zip" "$base")
          done < <(find artifacts -type d -name '*.app' -print0 || true)
          echo "=== upload staging ==="
          ls -la upload
          # Drop any accidental directories from upload/
          find upload -mindepth 1 -type d -exec rm -rf {} + 2>/dev/null || true
          test "$(ls -A upload)" || (echo "No artifacts to publish" && exit 1)
          if [[ "${{ needs.build-launcher.result }}" == "success" ]]; then
            if ! find upload -type f \( -iname '*FreshwaterLauncher*' -o -iname '*.msi' -o -iname '*.AppImage' -o -iname '*.dmg' -o -iname '*.deb' -o -iname '*.exe' -o -iname '*.zip' \) ! -iname 'fwl-sync-server*' | grep -q .; then
              echo "ERROR: build-launcher succeeded but no desktop client files staged"
              find artifacts -maxdepth 4 -print | head -n 200
              exit 1
            fi
          fi
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          NOTES="## FreshwaterLauncher ${TAG}

          Cross-platform Minecraft Java launcher (FWL) + self-hosted **fwl-sync-server**.

          ### Downloads
          - **Desktop launcher**: Windows / Linux / macOS installers
          - **Android**: \`FreshwaterLauncher-android-arm64.apk\` (ARM64 phone)
          - **Sync backend**: \`fwl-sync-server-*\`

          ### Docs
          - Microsoft auth: \`docs/microsoft-auth.md\`
          - Sync protocol: \`docs/fwl-sync-protocol.md\`
          - Android: \`docs/android.md\`
          "
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" upload/* --clobber
          else
            gh release create "$TAG" upload/* \
              --title "FreshwaterLauncher $TAG" \
              --notes "$NOTES"
          fi
